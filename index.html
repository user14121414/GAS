<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roulette</title>
<link rel="icon" href="favicon.ico">

<!-- Brython -->
<script src="https://cdn.jsdelivr.net/npm/brython@3.12.3/brython.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/brython@3.12.3/brython_stdlib.js"></script>

<style>

body{
    margin:0;
    background: url("https://t4.ftcdn.net/jpg/03/25/38/41/360_F_325384191_sg1D5lYWfRedGQsBm8xIHnsSAUUUVxGE.jpg") no-repeat center center fixed;
    background-size: cover;

    color:white;

    font-family:Arial,sans-serif;

    text-align:center;
}

h1{
    color:gold;

    margin-top:20px;

    text-shadow:
        0 0 10px rgba(255,215,0,0.7);
}

.container{
    display:flex;

    flex-direction:column;

    align-items:center;

    gap:20px;

    padding:20px;
}

canvas{
    background:#111827;

    border:6px solid gold;

    border-radius:50%;

    box-shadow:
        0 0 25px rgba(255,215,0,0.35),
        0 0 60px rgba(255,215,0,0.15);
}

.pointer{
    width:0;
    height:0;

    border-left:18px solid transparent;
    border-right:18px solid transparent;
    border-top:35px solid gold;

    margin-bottom:-10px;

    filter:drop-shadow(
        0 0 8px gold
    );
}

.panel{
    background:linear-gradient(
        145deg,
        #14532d,
        #0f3d24
    );

    padding:20px;

    border-radius:16px;

    width:340px;

    border:3px solid gold;

    box-shadow:
        0 0 10px rgba(255,215,0,0.4),
        0 0 25px rgba(255,215,0,0.25),
        inset 0 0 15px rgba(255,215,0,0.15);

    position:relative;
}

.panel::before{
    content:"";

    position:absolute;

    inset:8px;

    border:1px solid rgba(255,215,0,0.45);

    border-radius:10px;

    pointer-events:none;
}

button{
    background:linear-gradient(
        145deg,
        #b91c1c,
        #7f1d1d
    );

    color:white;

    border:2px solid gold;

    padding:12px 18px;

    margin:5px;

    border-radius:8px;

    cursor:pointer;

    font-size:16px;

    transition:0.2s;

    box-shadow:
        0 0 10px rgba(255,215,0,0.25);
}

button:hover{
    background:linear-gradient(
        145deg,
        #dc2626,
        #991b1b
    );

    transform:scale(1.05);

    box-shadow:
        0 0 20px rgba(255,215,0,0.5);
}

input{
    padding:10px;

    border:none;

    border-radius:8px;

    width:90px;

    text-align:center;

    font-size:16px;

    background:#111827;

    color:white;

    border:2px solid gold;
}

.balance{
    font-size:22px;

    color:gold;

    margin-bottom:15px;

    text-shadow:
        0 0 5px gold,
        0 0 15px rgba(255,215,0,0.5);
}

.result{
    font-size:22px;

    margin-top:15px;

    min-height:40px;
}

</style>
</head>

<body onload="brython()">

<h1>Gambling Addiction Simulator</h1>

<div class="container">

    <div class="pointer"></div>

    <canvas
        id="wheel"
        width="500"
        height="500">
    </canvas>

    <div class="panel">

        <div class="balance">
            Balance:
            $<span id="balance">1000</span>
        </div>

        <p>Bet Amount</p>

        <input
            id="bet_amount"
            type="number"
            value="50"
            min="1"
        >

        <div>
            <button id="red_btn">
                Bet Red
            </button>

            <button id="black_btn">
                Bet Black
            </button>

            <button id="green_btn">
                Bet Green
            </button>
        </div>

        <div
            id="result"
            class="result">

            Place your bet!

        </div>

    </div>

</div>

<script type="text/python">

from browser import document, timer
import math
import random

canvas = document["wheel"]
ctx = canvas.getContext("2d")

balance = 1000
rotation = 0
spinning = False

roulette_numbers = [
    0,32,15,19,4,21,2,25,17,34,
    6,27,13,36,11,30,8,23,10,5,
    24,16,33,1,20,14,31,9,22,18,
    29,7,28,12,35,3,26
]

red_numbers = {
    1,3,5,7,9,12,14,16,18,
    19,21,23,25,27,30,32,34,36
}

black_numbers = {
    2,4,6,8,10,11,13,15,17,
    20,22,24,26,28,29,31,33,35
}

def get_color(number):

    if number == 0:
        return "#16a34a"

    elif number in red_numbers:
        return "#dc2626"

    return "#111111"

def draw_wheel(rot):

    ctx.clearRect(0,0,500,500)

    cx = 250
    cy = 250

    radius = 220

    total = len(roulette_numbers)

    angle_size = (
        (2 * math.pi) / total
    )

    for i, num in enumerate(
        roulette_numbers
    ):

        start = (
            -i * angle_size + rot
        )

        end = (
            start - angle_size
        )

        ctx.beginPath()

        ctx.moveTo(cx, cy)

        ctx.arc(
            cx,
            cy,
            radius,
            start,
            end,
            True
        )

        ctx.closePath()

        ctx.fillStyle = get_color(num)

        ctx.fill()

        ctx.strokeStyle = "gold"

        ctx.lineWidth = 2

        ctx.stroke()

        angle = (
            start - (angle_size / 2)
        )

        tx = (
            cx + math.cos(angle) * 170
        )

        ty = (
            cy + math.sin(angle) * 170
        )

        ctx.save()

        ctx.translate(tx, ty)

        ctx.rotate(
            angle + math.pi / 2
        )

        ctx.fillStyle = "white"

        ctx.font = "16px Arial"

        ctx.textAlign = "center"

        ctx.fillText(str(num), 0, 0)

        ctx.restore()

    # Center hub
    ctx.beginPath()

    ctx.arc(
        cx,
        cy,
        50,
        0,
        2 * math.pi
    )

    ctx.fillStyle = "#222"

    ctx.fill()

    ctx.strokeStyle = "gold"

    ctx.lineWidth = 4

    ctx.stroke()

def update_balance():

    document["balance"].text = (
        str(balance)
    )

def spin_wheel(
    winning_index,
    callback
):

    global rotation
    global spinning

    spinning = True

    total = len(
        roulette_numbers
    )

    angle_size = (
        (2 * math.pi) / total
    )

    pointer_angle = (
        -math.pi / 2
    )

    target_rotation = (
        pointer_angle
        + (
            (winning_index + 0.5)
            * angle_size
        )
    )

    current_rotation = (
        rotation % (2 * math.pi)
    )

    delta = (
        target_rotation
        - current_rotation
    ) % (2 * math.pi)

    extra_spins = random.randint(
        5,
        7
    )

    final_rotation = (
        rotation
        + delta
        + (
            2 * math.pi
            * extra_spins
        )
    )

    duration = 3000

    frames = 120

    start_rotation = rotation

    current_frame = 0

    def animate():

        nonlocal current_frame

        global rotation
        global spinning

        current_frame += 1

        progress = (
            current_frame / frames
        )

        eased = (
            1 - ((1 - progress) ** 3)
        )

        current_rot = (
            start_rotation
            + (
                (
                    final_rotation
                    - start_rotation
                ) * eased
            )
        )

        draw_wheel(current_rot)

        if current_frame < frames:

            timer.set_timeout(
                animate,
                duration // frames
            )

        else:

            rotation = (
                final_rotation
                % (2 * math.pi)
            )

            draw_wheel(rotation)

            spinning = False

            callback()

    animate()

def play_game(bet_choice):

    global balance

    if spinning:
        return

    try:

        bet = int(
            document[
                "bet_amount"
            ].value
        )

    except:

        document[
            "result"
        ].text = (
            "Invalid bet amount"
        )

        return

    if bet <= 0:

        document[
            "result"
        ].text = (
            "Bet must be positive"
        )

        return

    if bet > balance:

        document[
            "result"
        ].text = (
            "Not enough balance"
        )

        return

    winning_number = random.choice(
        roulette_numbers
    )

    winning_index = (
        roulette_numbers.index(
            winning_number
        )
    )

    def finish_round():

        global balance

        if winning_number == 0:

            result_color = "green"

        elif (
            winning_number
            in red_numbers
        ):

            result_color = "red"

        else:

            result_color = "black"

        if (
            result_color
            == bet_choice
        ):

            if (
                result_color
                == "green"
            ):

                winnings = bet * 14

            else:

                winnings = bet

            balance += winnings

            document[
                "result"
            ].text = (
                f"{winning_number} "
                f"{result_color.upper()} "
                f"+${winnings}"
            )

        else:

            balance -= bet

            document[
                "result"
            ].text = (
                f"{winning_number} "
                f"{result_color.upper()} "
                f"-${bet}"
            )

        update_balance()

    spin_wheel(
        winning_index,
        finish_round
    )

def bet_red(ev):

    play_game("red")

def bet_black(ev):

    play_game("black")

def bet_green(ev):

    play_game("green")

document["red_btn"].bind(
    "click",
    bet_red
)

document["black_btn"].bind(
    "click",
    bet_black
)

document["green_btn"].bind(
    "click",
    bet_green
)

draw_wheel(rotation)

update_balance()

</script>

</body>
</html>
